<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creator Hub - Halu Goods</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="theme-color" content="#333333">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Creator Hub">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #333333; font-family: 'Segoe UI', sans-serif;}
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <!-- Iframe dengan tambahan izin: allow-popups-to-escape-sandbox -->
    <iframe id="gas-frame" 
            src="https://script.google.com/macros/s/AKfycbwUl0LS6XEvU_yIxdyPX8eeR9KWg6YlHLgOtquYP-IVwDqdNP9i9P_0NOlkRj-CA3r3/exec?mode=admin" 
            allowfullscreen 
            allow="clipboard-read; clipboard-write"
            sandbox="allow-scripts allow-top-navigation allow-top-navigation-by-user-activation allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals">
    </iframe>

    <script>
        window.onload = function() {
            var urlParams = window.location.search;
            var iframe = document.getElementById('gas-frame');
            if (urlParams) {
                iframe.src = iframe.src + urlParams.replace('?', '&');
            }
        };
    </script>
</body>
</html>
